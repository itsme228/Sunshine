---
name: usbridge Release

on:
  push:
    tags:
      - 'v*.usbridge'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2026.703.usbridge)'
        required: false

jobs:
  build-macos:
    name: macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
            artifact: Sunshine-macOS-arm64.dmg
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode 16.2
        run: sudo xcode-select --switch /Applications/Xcode_16.2.app

      - name: Install dependencies
        run: |
          brew install --quiet \
            cmake \
            node \
            pkgconf \
            icu4c@78 \
            miniupnpc \
            openssl@3 \
            opus

      - name: Configure
        run: |
          cmake \
            -B build \
            -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_DOCS=OFF \
            -DICU_ROOT="$(brew --prefix icu4c@78)" \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)" \
            -DOpus_ROOT_DIR="$(brew --prefix opus)" \
            -DSUNSHINE_ENABLE_TRAY=OFF \
            -DSUNSHINE_PUBLISHER_NAME="usbridge_agent" \
            -DSUNSHINE_PUBLISHER_WEBSITE="https://github.com/itsme228/usbridge_agent" \
            -DSUNSHINE_PUBLISHER_ISSUE_URL="https://github.com/itsme228/usbridge_agent/issues"

      - name: Build
        run: cmake --build build -j $(sysctl -n hw.ncpu)

      - name: Package DMG
        run: |
          cd build
          cpack -G DragNDrop --config CPackConfig.cmake
          mkdir -p ../artifacts
          cp cpack_artifacts/Sunshine.dmg "../artifacts/${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.artifact }}

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-boost
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-cppwinrt
            mingw-w64-ucrt-x86_64-curl-winssl
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-MinHook
            mingw-w64-ucrt-x86_64-miniupnpc
            mingw-w64-ucrt-x86_64-nlohmann-json
            mingw-w64-ucrt-x86_64-nodejs
            mingw-w64-ucrt-x86_64-onevpl
            mingw-w64-ucrt-x86_64-openssl
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-toolchain

      - name: Configure
        shell: msys2 {0}
        run: |
          cmake \
            -B build \
            -S . \
            -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_DOCS=OFF \
            -DSUNSHINE_ENABLE_TRAY=OFF \
            -DSUNSHINE_PUBLISHER_NAME="usbridge_agent" \
            -DSUNSHINE_PUBLISHER_WEBSITE="https://github.com/itsme228/usbridge_agent" \
            -DSUNSHINE_PUBLISHER_ISSUE_URL="https://github.com/itsme228/usbridge_agent/issues"

      - name: Build
        shell: msys2 {0}
        run: cmake --build build -j $(nproc)

      - name: Package ZIP
        shell: msys2 {0}
        run: |
          cd build
          cpack -G ZIP --config CPackConfig.cmake
          mkdir -p ../artifacts
          cp cpack_artifacts/Sunshine.zip ../artifacts/Sunshine-Windows-x86_64-portable.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sunshine-Windows-x86_64-portable.zip
          path: artifacts/Sunshine-Windows-x86_64-portable.zip

  build-linux:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install cmake 4.x from Kitware
        run: |
          wget -qO - https://apt.kitware.com/keys/kitware-archive-latest.asc \
            | gpg --dearmor \
            | sudo tee /etc/apt/trusted.gpg.d/kitware.gpg >/dev/null
          sudo apt-add-repository -y \
            "deb https://apt.kitware.com/ubuntu/ $(lsb_release -cs) main"
          sudo apt-get update -qq
          sudo apt-get install -y cmake

      - name: Install build dependencies
        run: |
          sudo add-apt-repository universe -y
          sudo add-apt-repository ppa:ubuntu-toolchain-r/test -y
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential gcc-14 g++-14 pkg-config nodejs npm \
            libssl-dev libevdev-dev libopus-dev libpulse-dev \
            libcurl4-openssl-dev libgbm-dev libnuma-dev \
            libpipewire-0.3-dev libsystemd-dev libnotify-dev \
            libx11-dev libxrandr-dev libxfixes-dev libxtst-dev \
            libxcb-shm0-dev libxcb-xfixes0-dev libxcb1-dev \
            libdrm-dev libcap-dev libudev-dev libwayland-dev \
            libminiupnpc-dev libva-dev libvulkan-dev \
            qtbase5-dev libqt5svg5-dev glslang-tools

      - name: Configure
        env:
          CC: gcc-14
          CXX: g++-14
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_DOCS=OFF \
            -DSUNSHINE_BUILD_APPIMAGE=ON \
            -DCUDA_FAIL_ON_MISSING=OFF \
            -DSUNSHINE_ENABLE_TRAY=OFF \
            -DSUNSHINE_PUBLISHER_NAME="usbridge_agent" \
            -DSUNSHINE_PUBLISHER_WEBSITE="https://github.com/itsme228/usbridge_agent" \
            -DSUNSHINE_PUBLISHER_ISSUE_URL="https://github.com/itsme228/usbridge_agent/issues"

      - name: Build
        run: cmake --build build -j $(nproc)

      - name: Install to staging and package tarball
        run: |
          DESTDIR=staging cmake --install build --prefix /usr
          mkdir -p artifacts
          tar -czf artifacts/Sunshine-Linux-x86_64.tar.gz -C staging .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sunshine-Linux-x86_64.tar.gz
          path: artifacts/Sunshine-Linux-x86_64.tar.gz

  release:
    name: Create Release
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [[ -z "$TAG" ]]; then
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Sunshine ${{ steps.tag.outputs.tag }} (usbridge fork)"
          body: |
            Sunshine fork by usbridge with `web_bind_address` config option.

            Set `web_bind_address = 127.0.0.1` in sunshine.conf to restrict the
            admin HTTPS UI to localhost while streaming ports bind to your VPN
            interface via `bind_address`.
          files: |
            artifacts/Sunshine-macOS-arm64.dmg
            artifacts/Sunshine-Windows-x86_64-portable.zip
            artifacts/Sunshine-Linux-x86_64.tar.gz
          fail_on_unmatched_files: false
